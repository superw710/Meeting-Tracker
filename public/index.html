<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>会议保障排期表 - 2.0正式版</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📅</text></svg>">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        .table-container { border: 1px solid #e5e7eb; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); background: white; }
        
        /* --- 核心修复：手机端自适应 --- */
        table { 
            border-collapse: collapse; 
            width: 100%; 
            min-width: 1550px; /* 关键：确保手机端内容不挤压，允许左右滑动 */
        }

        /* 仅在电脑端（宽度大于768px）使用固定布局 */
        @media (min-width: 768px) {
            table { table-layout: fixed; min-width: 100%; }
        }

        thead th { background-color: #f9fafb; border-bottom: 1px solid #e5e7eb; border-right: 1px solid #f3f4f6; color: #374151; font-weight: 700; padding: 16px 12px !important; font-size: 0.9rem; vertical-align: middle; }
        tbody td { border-bottom: 1px solid #f3f4f6; border-right: 1px solid #f3f4f6; padding: 12px !important; vertical-align: middle; color: #4b5563; font-size: 0.875rem; }

        /* 列宽占比 */
        .col-idx { width: 60px; }
        .col-title { width: 24%; }
        .col-time { width: 165px; white-space: nowrap; }
        .col-loc { width: 110px; white-space: nowrap; }
        .col-type { width: 95px; white-space: nowrap; }
        .col-dept { width: 90px; white-space: nowrap; }
        .col-leader { width: 9%; }
        .col-scope { width: 110px; }
        .col-notes { width: auto; } 
        .col-ops { width: 90px; }

        .cell-content { word-break: break-all; overflow: hidden; }
        #mainContent { display: none; }
    </style>
</head>
<body class="bg-gray-50">

    <div id="loginOverlay" class="fixed inset-0 flex items-center justify-center z-[999]">
        <div class="absolute inset-0 bg-gradient-to-br from-blue-400 to-sky-200"></div>
        <div class="relative bg-white/80 backdrop-blur-xl p-10 rounded-[2.5rem] shadow-2xl w-[90%] max-w-[400px] border border-white/50 text-center">
            <h2 class="text-2xl font-black mb-6 text-gray-800">安全认证</h2>
            <input type="password" id="webPassInput" placeholder="请输入访问密码" onkeypress="if(event.keyCode==13) checkLogin()" class="w-full bg-white/50 border border-blue-100 p-4 rounded-2xl text-center text-lg font-bold outline-none mb-4">
            <button onclick="checkLogin()" class="w-full bg-blue-500 hover:bg-blue-600 text-white p-4 rounded-2xl font-bold text-lg shadow-lg">立即进入</button>
            <p id="loginError" class="text-red-500 mt-4 text-sm font-medium hidden">⚠️ 密码错误</p>
        </div>
    </div>

    <div id="mainContent" class="p-4 md:p-6">
        <div class="w-full md:w-[98%] mx-auto">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-end mb-8 gap-4">
                <div>
                    <h1 class="text-2xl md:text-3xl font-black text-blue-600">🗓️ 会议保障排期表</h1>
                    <p class="text-gray-400 text-sm mt-1">系统已就绪，当日及后续会议将自动置顶并高亮显示</p>
                </div>
                <div class="flex items-center gap-3">
                    <button onclick="exportToExcel()" class="bg-emerald-500 text-white px-4 py-2 rounded-xl font-bold shadow-md text-sm">导出表格</button>
                    <button onclick="logout()" class="text-gray-400 hover:text-red-500 text-sm font-medium">退出登录</button>
                </div>
            </div>

            <div class="bg-white p-5 rounded-3xl shadow-sm mb-8 border border-gray-100">
                <h2 class="text-lg font-bold mb-4 text-gray-700" id="formTitle">➕ 新增会议任务</h2>
                <form id="addMeetingForm" class="grid grid-cols-1 md:grid-cols-4 gap-4">
                    <input type="hidden" id="edit_id" value="">
                    <input type="text" id="title" placeholder="会议名称" required class="border p-3 rounded-xl md:col-span-2 bg-gray-50 outline-none">
                    <div class="flex flex-col md:flex-row items-center gap-2 md:col-span-2">
                        <input type="datetime-local" id="meeting_time" required class="border p-3 rounded-xl bg-gray-50 w-full">
                        <span class="text-gray-400 text-xs">至</span>
                        <input type="datetime-local" id="meeting_end_time" class="border p-3 rounded-xl bg-gray-50 w-full">
                    </div>
                    <select id="location" required class="border p-3 rounded-xl bg-gray-50">
                        <option value="" disabled selected>选择地点</option>
                        <option value="会商室">会商室</option>
                        <option value="值班室">值班室</option>
                        <option value="指挥中心">指挥大厅</option>
                        <option value="西会议室">西会议室</option>
                    </select>
                    <select id="meeting_type" class="border p-3 rounded-xl bg-gray-50">
                        <option value="本地会">本地会</option>
                        <option value="视频会">视频会</option>
                        <option value="调度会">调度会</option>
                        <option value="参观接待">参观接待</option>
                        <option value="突发事件">突发事件</option>
                    </select>
                    <input type="text" id="department" placeholder="主办科室" class="border p-3 rounded-xl bg-gray-50">
                    <select id="status" class="border p-3 rounded-xl bg-gray-50">
                        <option value="市级">市级</option>
                        <option value="区市参加">区市参加</option>
                        <option value="区市、镇街参加">区市、镇街参加</option>
                    </select>
                    <input type="text" id="leader" placeholder="参会领导" class="border p-3 rounded-xl bg-gray-50 md:col-span-2">
                    <input type="text" id="notes" placeholder="保障要求与备注" class="border p-3 rounded-xl bg-gray-50 md:col-span-2">
                    <div class="md:col-span-4 mt-2">
                        <button type="submit" id="submitBtn" class="w-full bg-blue-500 text-white p-4 rounded-xl font-black text-lg hover:bg-blue-600 shadow-lg transition-all">保存会议排期</button>
                    </div>
                </form>
            </div>

            <div class="table-container">
                <div class="overflow-x-auto">
                    <table id="meetingTableMain">
                        <thead>
                            <tr>
                                <th class="text-center col-idx">序号</th>
                                <th class="text-center col-title">会议名称</th>
                                <th class="text-center col-time">起止时间</th>
                                <th class="text-center col-loc">地点</th>
                                <th class="text-center col-type">类型</th>
                                <th class="text-center col-dept">主办科室</th>
                                <th class="text-center col-leader">参会领导</th>
                                <th class="text-center col-scope">参会范围</th>
                                <th class="text-left col-notes">保障备注</th>
                                <th class="text-center col-ops no-export">操作</th>
                            </tr>
                        </thead>
                        <tbody id="meetingList"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        let meetingDataList = [];
        let authToken = sessionStorage.getItem('meeting_access_token');

        window.onload = () => { if (authToken) showSystem(); };

        async function checkLogin() {
            const pwd = document.getElementById('webPassInput').value;
            const res = await fetch('/api/meetings', { headers: { 'X-Web-Password': pwd } });
            if (res.ok) { sessionStorage.setItem('meeting_access_token', pwd); authToken = pwd; showSystem(); }
            else { document.getElementById('loginError').classList.remove('hidden'); }
        }

        function showSystem() {
            document.getElementById('loginOverlay').classList.add('hidden');
            document.getElementById('mainContent').style.display = 'block';
            loadMeetings();
        }

        function logout() { sessionStorage.removeItem('meeting_access_token'); location.reload(); }

        async function loadMeetings() {
            const res = await fetch('/api/meetings', { headers: { 'X-Web-Password': authToken } });
            if (res.ok) { meetingDataList = await res.json(); renderTable(); }
        }

        function renderTable() {
            const tbody = document.getElementById('meetingList');
            tbody.innerHTML = '';
            const today = new Date().setHours(0,0,0,0);

            const typeColorMap = {
                '本地会': 'bg-blue-50 text-blue-700 border-blue-200',
                '视频会': 'bg-purple-50 text-purple-700 border-purple-200',
                '调度会': 'bg-orange-50 text-orange-700 border-orange-200',
                '参观接待': 'bg-emerald-50 text-emerald-700 border-emerald-200',
                '突发事件': 'bg-red-50 text-red-700 border-red-200'
            };

            meetingDataList.sort((a, b) => {
                const endA = new Date(a.meeting_end_time || a.meeting_time).getTime();
                const endB = new Date(b.meeting_end_time || b.meeting_time).getTime();
                const isAActive = endA >= today;
                const isBActive = endB >= today;
                if (isAActive && !isBActive) return -1;
                if (!isAActive && isBActive) return 1;
                return endB - endA;
            });

            meetingDataList.forEach((m, index) => {
                const isFuture = new Date(m.meeting_end_time || m.meeting_time).getTime() >= today;
                const rowClass = isFuture ? 'bg-pink-50 border-l-4 border-l-pink-400' : 'opacity-60 bg-white';
                const fontWeight = isFuture ? 'font-bold' : 'font-normal';
                const textColor = isFuture ? 'text-gray-800' : 'text-gray-400';
                
                let timeDisplay = `<div class="text-blue-600 text-sm whitespace-nowrap">起: ${m.meeting_time.replace('T',' ')}</div>`;
                if (m.meeting_end_time) {
                    timeDisplay += `<div class="text-red-500 text-sm whitespace-nowrap">止: ${m.meeting_end_time.replace('T',' ')}</div>`;
                }

                const typeStyle = typeColorMap[m.meeting_type] || 'bg-gray-50 text-gray-700 border-gray-200';

                tbody.innerHTML += `
                    <tr class="${rowClass} hover:bg-pink-100/30 transition-colors">
                        <td class="text-center ${textColor}">${index + 1}</td>
                        <td class="text-center ${fontWeight} cell-content ${textColor}">${m.title}</td>
                        <td class="text-left px-2 whitespace-nowrap">${timeDisplay}</td>
                        <td class="text-center whitespace-nowrap ${textColor}">${m.location}</td>
                        <td class="text-center whitespace-nowrap">
                            <span class="px-2 py-0.5 rounded-full text-sm border whitespace-nowrap ${typeStyle}">${m.meeting_type}</span>
                        </td>
                        <td class="text-center whitespace-nowrap ${textColor}">${m.department || '-'}</td>
                        <td class="text-center">${createLeaderTags(m.leader, isFuture)}</td>
                        <td class="text-center text-xs font-bold ${isFuture ? '' : 'opacity-40'} ${m.status.includes('镇街') ? 'text-red-600' : (m.status.includes('区市') ? 'text-blue-600' : 'text-gray-400')}">${m.status}</td>
                        <td class="text-left col-notes cell-content ${textColor}">${m.notes || '-'}</td>
                        <td class="text-center no-export">
                            <button onclick="editMeeting(${m.id})" class="text-blue-500 underline text-xs mr-2">修改</button>
                            <button onclick="deleteMeeting(${m.id})" class="text-red-400 underline text-xs">删除</button>
                        </td>
                    </tr>`;
            });
        }

        function createLeaderTags(str, isFuture) {
            if (!str || str === '-') return '-';
            const opacity = isFuture ? '' : 'opacity-50';
            return str.split(/[、,，\s]+/).filter(n => n.trim() !== '').map(name => 
                `<span class="inline-block bg-blue-50 text-gray-700 border border-blue-100 px-2 py-0.5 rounded mr-1 mb-1 text-sm font-medium ${opacity}">${name}</span>`
            ).join('');
        }

        function checkConflict(newData) {
            const newS = new Date(newData.meeting_time).getTime();
            const newE = newData.meeting_end_time ? new Date(newData.meeting_end_time).getTime() : (newS + 3600000);
            if (newData.meeting_end_time && newE <= newS) { alert("❌ 结束时间错误"); return true; }
            for (const exist of meetingDataList) {
                if (newData.id && String(exist.id) === String(newData.id)) continue;
                if (exist.location === newData.location) {
                    const existS = new Date(exist.meeting_time).getTime();
                    const existE = exist.meeting_end_time ? new Date(exist.meeting_end_time).getTime() : (existS + 3600000);
                    if (newS < existE && newE > existS) {
                        alert(`⚠️ 会议冲突！${newData.location}会场  在该时间段已有如下会议占用：\n「${exist.title}」`);
                        return true;
                    }
                }
            }
            return false;
        }

        document.getElementById('addMeetingForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const editId = document.getElementById('edit_id').value;
            const data = {
                id: editId ? Number(editId) : undefined,
                title: document.getElementById('title').value,
                meeting_time: document.getElementById('meeting_time').value,
                meeting_end_time: document.getElementById('meeting_end_time').value,
                location: document.getElementById('location').value,
                meeting_type: document.getElementById('meeting_type').value,
                department: document.getElementById('department').value,
                leader: document.getElementById('leader').value,
                status: document.getElementById('status').value,
                notes: document.getElementById('notes').value
            };
            if (checkConflict(data)) return;
            await fetch('/api/meetings', {
                method: editId ? 'PUT' : 'POST',
                headers: { 'Content-Type': 'application/json', 'X-Web-Password': authToken },
                body: JSON.stringify(data)
            });
            resetForm(); loadMeetings();
        });

        function editMeeting(id) {
            const m = meetingDataList.find(i => i.id === id);
            document.getElementById('edit_id').value = m.id;
            document.getElementById('title').value = m.title;
            document.getElementById('meeting_time').value = m.meeting_time;
            document.getElementById('meeting_end_time').value = m.meeting_end_time || '';
            document.getElementById('location').value = m.location;
            document.getElementById('meeting_type').value = m.meeting_type;
            document.getElementById('department').value = m.department;
            document.getElementById('leader').value = m.leader;
            document.getElementById('status').value = m.status;
            document.getElementById('notes').value = m.notes;
            document.getElementById('formTitle').innerText = '✏️ 修改会议记录';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        async function deleteMeeting(id) {
            if (!confirm("确定删除？")) return;
            const pass = prompt("输入管理员密码：");
            if (!pass) return;
            const res = await fetch(`/api/meetings?id=${id}`, {
                method: 'DELETE',
                headers: { 'X-Web-Password': authToken, 'X-Admin-Password': pass }
            });
            if (res.ok) { alert("已删除"); loadMeetings(); } else { alert("密码错误"); }
        }

        function resetForm() { document.getElementById('addMeetingForm').reset(); document.getElementById('edit_id').value = ''; document.getElementById('formTitle').innerText = '➕ 新增会议任务'; }
        function exportToExcel() { const wb = XLSX.utils.table_to_book(document.getElementById('meetingTableMain')); XLSX.writeFile(wb, `会议排期表.xlsx`); }
    </script>
</body>
</html>
